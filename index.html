<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Kalkulator Gizi</title>

<link rel="icon" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <img src="logo.png" class="logo" alt="Logo SPPG Cicadas 01" />
    <h1>SPPG Cicadas 01</h1>
    <p class="credit">Created by Fikri Purwana Senja</p>
  </div>

  <!-- INPUT CARD -->
  <div class="card dark">

    <h2>Input Bahan</h2>

    <div class="input-row input-row-flex">

<div class="autocomplete-wrapper">
  <input type="text" id="namaBahan" autocomplete="off">
  <div id="autocomplete-list" class="autocomplete-items"></div>
</div>

  <input id="beratBahan" class="input-gram" type="number" placeholder="Gram">

  <button type="button" class="btn-primary" onclick="tambahBahan()">
    Tambah
  </button>

</div>

    <ul id="listBahan"></ul>

    <div class="action-row">
      <button type="button" class="btn-success" onclick="generateLaporan()">
        Generate Laporan
      </button>

      <button type="button" class="btn-secondary" onclick="exportPDF()">
  Export PDF
</button>
    </div>

  </div>

  <h2 id="printTitle" class="print-title"></h2>

  <!-- HASIL -->
  <div id="hasil-wrapper">
  <div id="hasil" class="hasil-grid"></div>

</div>

  <!-- NOTE -->
  <div class="card dark">
    <h2>Catatan Hari Ini</h2>
    <textarea id="note" placeholder="Tulis catatan hari ini..."></textarea>
  </div>

</div>

  <div id="laporanPDF">
  <!-- LOGO -->
  <div style="text-align:center; margin-bottom:10px;">
    <img src="logo.png" width="80">
  </div>

  <!-- JUDUL -->
  <h2 id="judulLaporan" style="text-align:center;">
    LAPORAN KANDUNGAN GIZI
  </h2>

  <!-- TANGGAL -->
  <p id="tanggalLaporan" style="text-align:center;"></p>

  <!-- ISI HASIL -->
  <div id="hasilLaporan"></div>

  <!-- CATATAN -->
  <div id="catatanLaporan"></div>
</div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
