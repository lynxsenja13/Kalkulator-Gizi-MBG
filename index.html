<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Kalkulator Gizi</title>

<link rel="icon" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <img src="logo.png" class="logo" alt="Logo SPPG Cicadas 01" />
    <h1>SPPG Cicadas 01</h1>
    <p class="credit">Created by Fikri Purwana Senja</p>
  </div>

  <!-- INPUT CARD -->
  <div class="card dark">

    <h2>Input Bahan</h2>

    <div class="input-row input-row-flex">

  <div class="autocomplete input-nama">
    <input id="namaBahan" placeholder="Nama Bahan" autocomplete="off">
    <div id="dropdownBahan" class="dropdown"></div>
  </div>

  <input id="beratBahan" class="input-gram" type="number" placeholder="Gram">

  <button type="button" class="btn-primary" onclick="tambahBahan()">
    Tambah
  </button>

</div>

    <ul id="listBahan"></ul>

    <div class="action-row">
      <button type="button" class="btn-success" onclick="generateLaporan()">
        Generate Laporan
      </button>

      <button type="button" class="btn-secondary" onclick="window.print()">
        Export PDF
      </button>
    </div>

  </div>

  <!-- HASIL -->
  <div id="hasil-wrapper">
  <div id="hasil" class="hasil-grid"></div>

  <p id="emptyState" class="empty-state">
    Belum ada laporan. Silakan generate.
  </p>
</div>

  <!-- NOTE -->
  <div class="card dark">
    <h2>Catatan Hari Ini</h2>
    <textarea id="note" placeholder="Tulis catatan hari ini..."></textarea>
  </div>

</div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
