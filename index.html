<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kalkulator Gizi</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <img src="logo.png" class="logo" />
    <h1>SPPG Cicadas 01</h1>
    <p class="credit">Created by Fikri Purwana Senja</p>
  </div>

  <!-- INPUT CARD -->
  <div class="card dark">

    <h2>Input Bahan</h2>

    <div class="input-row">
      <input id="namaBahan" list="bahanListAuto" placeholder="Nama bahan">
      <datalist id="bahanListAuto"></datalist>

      <input id="beratBahan" type="number" placeholder="Gram">
      <button class="btn-primary" onclick="tambahBahan()">Tambah</button>
    </div>

    <ul id="listBahan"></ul>

    <div class="action-row">
      <button class="btn-success" onclick="generateLaporan()">
        Generate Laporan
      </button>

      <button class="btn-secondary" onclick="window.print()">
        Export PDF
      </button>
    </div>

  </div>

  <!-- HASIL -->
  <div id="hasil"></div>

  <!-- NOTE -->
  <div class="card dark">
    <h2>Catatan Hari Ini</h2>
    <textarea id="note"></textarea>
  </div>

</div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
